# Production stack. Pulls the published image from GHCR rather than building
# from source. Run with: docker compose -f docker-compose.prod.yml up -d
#
# Required env vars come from a local `.env` file (copy from
# `.env.production.example` and fill in real values).
services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host port published. The app reaches Postgres over the compose
    # network at `db:5432`. Use `docker compose exec db psql ...` for ad-hoc
    # access from the host.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: ghcr.io/crypticdata/nextrep-app:${APP_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      NODE_ENV: production
    ports:
      # Override APP_HOST_PORT in .env if 3000 is already taken on this host.
      - "${APP_HOST_PORT:-3000}:3000"

volumes:
  postgres-data:
