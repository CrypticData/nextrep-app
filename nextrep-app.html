  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  ::-webkit-scrollbar{display:none}
  input,button,select{font-family:inherit}
  input::placeholder{color:rgba(255,255,255,0.25)}
  button{cursor:pointer;-webkit-tap-highlight-color:transparent}

  /* App shell */
  .app{display:flex;flex-direction:column;height:100dvh;width:100vw;overflow:hidden;background:#0f0f0f}
  .screen{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
  .topbar{
    flex-shrink:0;
    padding:env(safe-area-inset-top,12px) 20px 0;
    background:#0f0f0f;
  }
  .topbar-inner{height:52px;display:flex;align-items:center;gap:10px}
  .content-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
  .content-inner{padding:16px 20px calc(env(safe-area-inset-bottom,0px) + 80px)}

  /* Bottom nav */
  .bottom-nav{
    flex-shrink:0;
    display:flex;
    background:#141414;
    border-top:1px solid rgba(255,255,255,0.08);
    padding-bottom:env(safe-area-inset-bottom,8px);
    z-index:100;
  }
  .tab-btn{
    flex:1;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:4px;background:none;border:none;
    color:rgba(255,255,255,0.32);font-size:10px;font-weight:500;
    transition:color 0.15s;padding:10px 0 4px;
    -webkit-tap-highlight-color:transparent;
  }
  .tab-btn.active{font-weight:700}

  /* Cards */
  .card{background:#1a1a1a;border:1px solid rgba(255,255,255,0.06);border-radius:16px;overflow:hidden}
  .card-lg{border-radius:20px}

  /* Misc */
  .fade-in{animation:fi 0.15s ease}
  @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .section-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.32);letter-spacing:.09em;text-transform:uppercase;margin-bottom:10px}
  .search-wrap{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.06);border-radius:13px;padding:11px 14px}
  .ex-row{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.06);background:none;border-left:none;border-right:none;border-top:none;width:100%;text-align:left}
  .ex-row:last-child{border-bottom:none}
  .sett-row{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid rgba(255,255,255,0.05)}
  .sett-row:last-child{border-bottom:none}
  .unit-toggle{display:flex;background:rgba(255,255,255,0.06);border-radius:9px;overflow:hidden}
  .unit-btn{padding:5px 15px;border:none;font-size:13px;font-weight:600;color:rgba(255,255,255,0.4);background:transparent;transition:all .15s}
  .unit-btn.active{color:#fff;border-radius:8px}
  .stat-pill{background:rgba(255,255,255,0.07);border-radius:22px;padding:7px 14px;border:none;font-size:13px;font-weight:600;color:rgba(255,255,255,0.45);transition:all .18s}
  .stat-pill.active{color:#fff}
  .wk-entry{display:flex;align-items:flex-start;gap:12px;padding:15px 0;border-bottom:1px solid rgba(255,255,255,0.06)}
  .wk-entry:last-child{border-bottom:none}
  .sw{position:relative;display:inline-block;width:44px;height:26px}
  .sw-track{position:absolute;inset:0;border-radius:13px;transition:background .2s;cursor:pointer}
  .sw-thumb{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:11px;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);pointer-events:none}

// ─── Chart ─────────────────────────────────────────────────────
function WorkoutChart({metric,accent}){
  const vals=chartData.map(d=>metric==='duration'?d.dur:metric==='volume'?d.vol/1000:d.reps/25);
  const yMax=metric==='duration'?6:metric==='volume'?16:8;
  const yLabels=metric==='duration'?['0','2h','4h','6h']:metric==='volume'?['0','5k','10k','15k']:['0','50','100','150'];
  const VW=320,VH=120,PL=32,PB=20,PT=6,PR=4;
  const cW=VW-PL-PR,cH=VH-PB-PT,slot=cW/chartData.length,bW=slot*.6;
  return <svg viewBox={`0 0 ${VW} ${VH}`} width="100%" style={{display:'block',overflow:'visible'}}>
    {[0,1/3,2/3,1].map((p,i)=>{
      const y=PT+cH-cH*p;
      return <g key={i}>
        <line x1={PL} y1={y} x2={VW-PR} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/>
        <text x={PL-4} y={y+4} fill="rgba(255,255,255,0.28)" fontSize="8" textAnchor="end" fontFamily="-apple-system,system-ui">{yLabels[i]}</text>
      </g>;
    })}
    {chartData.map((d,i)=>{
      const v=vals[i],bH=Math.max((v/yMax)*cH,2),x=PL+i*slot+(slot-bW)/2,y=PT+cH-bH;
      return <rect key={i} x={x} y={y} width={bW} height={bH} rx="3" fill={accent} opacity="0.85"/>;
    })}
    {chartData.map((d,i)=>i%2!==0?null:(
      <text key={i} x={PL+i*slot+slot/2} y={VH-3} fill="rgba(255,255,255,0.25)" fontSize="7.5" textAnchor="middle" fontFamily="-apple-system,system-ui">{d.label}</text>
    ))}
  </svg>;
}

function ExerciseList({accent,onSelectEx}){

    const mMu=mu==='All Muscles'||e.muscle===mu||e.cat===mu;
    return mEq&&mMu&&e.name.toLowerCase().includes(search.toLowerCase());
  });
  const Drop=({value,options,onChange,show,setShow})=>(
    <div style={{position:'relative'}}>
      <button onClick={()=>setShow(v=>!v)} style={{background:'#232323',border:'1px solid rgba(255,255,255,0.09)',borderRadius:22,padding:'8px 14px',color:'#fff',fontSize:13,fontWeight:600,display:'flex',alignItems:'center',gap:5,whiteSpace:'nowrap'}}>
        {value}
        <svg width="9" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1l4 4 4-4" stroke="rgba(255,255,255,0.4)" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </button>
      {show&&(
        <div style={{position:'absolute',top:'calc(100% + 6px)',left:0,background:'#242424',border:'1px solid rgba(255,255,255,0.1)',borderRadius:14,overflow:'hidden',zIndex:50,minWidth:180,boxShadow:'0 8px 32px rgba(0,0,0,0.6)'}}>
          {options.map(o=>(
            <button key={o} onClick={()=>{onChange(o);setShow(false);}} style={{display:'block',width:'100%',textAlign:'left',padding:'12px 16px',background:value===o?`${accent}18`:'none',border:'none',color:value===o?accent:'rgba(255,255,255,0.75)',fontSize:14,fontWeight:value===o?600:400}}>
              {o}
            </button>
          ))}
        </div>
      )}
    </div>
  );
  return(
    <div className="fade-in" onClick={()=>{setShowEq(false);setShowMu(false);}}>
      <div className="search-wrap" style={{marginBottom:12}}>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="5" stroke="rgba(255,255,255,0.28)" strokeWidth="1.5"/><path d="M10.5 10.5l3.5 3.5" stroke="rgba(255,255,255,0.28)" strokeWidth="1.5" strokeLinecap="round"/></svg>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search exercise" style={{background:'none',border:'none',outline:'none',color:'#fff',fontSize:15,flex:1}}/>
        {search&&<button onClick={()=>setSearch('')} style={{background:'none',border:'none',color:'rgba(255,255,255,0.3)',fontSize:18,lineHeight:1}}>×</button>}
      </div>
      <div style={{display:'flex',gap:10,marginBottom:18}} onClick={e=>e.stopPropagation()}>
        <Drop value={eq} options={EQ_FILTERS} onChange={setEq} show={showEq} setShow={setShowEq}/>
        <Drop value={mu} options={MU_FILTERS} onChange={setMu} show={showMu} setShow={setShowMu}/>
      </div>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontSize:13,color:'rgba(255,255,255,0.38)'}}>All Exercises</div>
        <button onClick={()=>setShowCreate(true)} style={{background:accent,border:'none',color:'#fff',fontSize:13,fontWeight:600,padding:'7px 14px',borderRadius:22,display:'flex',alignItems:'center',gap:5}}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="#fff" strokeWidth="2" strokeLinecap="round"/></svg>
          Create
        </button>
      </div>
      <div>
        {filtered.map((ex,i)=>(
          <button key={ex.id} className="ex-row" onClick={()=>onSelectEx(ex)}>
            <ExThumb cat={ex.cat}/>
            <div style={{flex:1}}>
              <div style={{fontSize:16,fontWeight:500,color:'#fff'}}>{ex.name}</div>

            </div>
            <Chevron/>
          </button>
        ))}
        {filtered.length===0&&<div style={{textAlign:'center',padding:'40px 0',color:'rgba(255,255,255,0.25)',fontSize:14}}>No exercises found</div>}

      {showCreate&&<CreateExerciseModal accent={accent} onClose={()=>setShowCreate(false)}/>}

// ─── Create Exercise Modal ─────────────────────────────────────
const CATS=['Chest','Back','Legs','Shoulders','Arms','Core','Cardio'];
const EQUIPS=['Barbell','Dumbbell','Machine','Cable','Bodyweight','None'];

      {/* sheet */}

        {/* handle */}

        </div>
        {/* header */}
        <div style={{display:'flex',alignItems:'center',padding:'12px 20px 16px',borderBottom:'1px solid rgba(255,255,255,0.07)'}}>
          <button onClick={onClose} style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',fontSize:15,padding:0}}>Cancel</button>
          <h3 style={{flex:1,textAlign:'center',fontSize:16,fontWeight:700,color:'#fff'}}>{editing?'Edit Exercise':'Create Exercise'}</h3>
          <button style={{background:accent,border:'none',color:'#fff',fontSize:15,fontWeight:700,padding:'6px 16px',borderRadius:10}}>{editing?'Save':'Create'}</button>
        </div>
        {/* form */}
        <div style={{flex:1,overflowY:'auto',padding:'20px 20px 8px'}}>
          <Field label="Name">
            <input value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Bench Press" style={inputStyle}/>
          </Field>
          <Field label="Category">
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {CATS.map(c=>(
                <button key={c} onClick={()=>setCat(c)} style={{padding:'8px 16px',borderRadius:22,border:'none',fontSize:13,fontWeight:600,background:cat===c?accent:'#232323',color:cat===c?'#fff':'rgba(255,255,255,0.5)',transition:'all .15s'}}>{c}</button>
              ))}
            </div>
          </Field>
          <Field label="Primary Muscle">
            <input value={muscle} onChange={e=>setMuscle(e.target.value)} placeholder="e.g. Pectorals" style={inputStyle}/>
          </Field>
          <Field label="Equipment">
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {EQUIPS.map(eq=>(
                <button key={eq} onClick={()=>setEquipment(eq)} style={{padding:'8px 16px',borderRadius:22,border:'none',fontSize:13,fontWeight:600,background:equipment===eq?accent:'#232323',color:equipment===eq?'#fff':'rgba(255,255,255,0.5)',transition:'all .15s'}}>{eq}</button>
              ))}
            </div>
          </Field>
          <Field label="Notes (optional)">
            <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Instructions, cues, tips…" rows={3} style={{...inputStyle,resize:'none',lineHeight:1.5}}/>
          </Field>
        </div>
      </div>
    </div>
  );
}

        </div>

      {/* Dashboard */}

          {label:'Statistics',icon:<IconStats/>,onClick:()=>{}},

}

function WorkoutSession({w,accent,onBack}){
  const [exercises,setExercises]=React.useState([]);
  const [elapsed,setElapsed]=React.useState(0);
  const [showExList,setShowExList]=React.useState(false);

  React.useEffect(()=>{
    const t=setInterval(()=>setElapsed(s=>s+1),1000);
    return()=>clearInterval(t);
  },[]);

  const fmt=s=>{const m=Math.floor(s/60),sec=s%60;return m>0?`${m}m ${sec}s`:`${sec}s`;};
  const totalSets=exercises.reduce((a,ex)=>a+ex.sets.length,0);
  const totalVol=exercises.reduce((a,ex)=>a+ex.sets.reduce((b,s)=>b+(parseFloat(s.weight)||0)*(parseInt(s.reps)||0),0),0);

  const addExercise=ex=>{setExercises(prev=>[...prev,{id:Date.now(),name:ex.name,cat:ex.cat,sets:[{id:1,weight:'',reps:'',done:false}]}]);setShowExList(false);};
  const addSet=exId=>setExercises(prev=>prev.map(ex=>ex.id===exId?{...ex,sets:[...ex.sets,{id:Date.now(),weight:'',reps:'',done:false}]}:ex));
  const updateSet=(exId,sId,field,val)=>setExercises(prev=>prev.map(ex=>ex.id===exId?{...ex,sets:ex.sets.map(s=>s.id===sId?{...s,[field]:val}:s)}:ex));
  const toggleDone=(exId,sId)=>setExercises(prev=>prev.map(ex=>ex.id===exId?{...ex,sets:ex.sets.map(s=>s.id===sId?{...s,done:!s.done}:s)}:ex));

  if(showExList) return(
    <div className="fade-in">
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:20}}>
        <button onClick={()=>setShowExList(false)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.65)',display:'flex',alignItems:'center',padding:4}}>
          <svg width="9" height="16" viewBox="0 0 8 14" fill="none"><path d="M7 1L1 7l6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </button>
        <h2 style={{flex:1,fontSize:17,fontWeight:700,color:'#fff',textAlign:'center'}}>Add Exercise</h2>
      </div>
      <ExerciseList accent={accent} onSelectEx={addExercise}/>
    </div>
  );

  return(
    <div className="fade-in">
      {/* header */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:0}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'rgba(255,255,255,0.55)',display:'flex',alignItems:'center',padding:4}}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M10 2L2 10M2 2l8 8" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
        </button>
        <div style={{flex:1,display:'flex',alignItems:'center',gap:5}}>
          <span style={{fontSize:17,fontWeight:700,color:'#fff'}}>Log Workout</span>
          <svg width="12" height="8" viewBox="0 0 12 8" fill="none"><path d="M1 1l5 5 5-5" stroke="rgba(255,255,255,0.4)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </div>
        <button style={{background:'none',border:'none',color:'rgba(255,255,255,0.45)',display:'flex',padding:4}}>
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="1.8"/><path d="M12 7v5l3 3" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"/></svg>
        </button>
        <button style={{background:accent,border:'none',color:'#fff',fontSize:15,fontWeight:700,padding:'8px 18px',borderRadius:11}}>Finish</button>
      </div>

      {/* stats bar */}
      <div style={{display:'flex',alignItems:'center',padding:'14px 0',borderBottom:'1px solid rgba(255,255,255,0.08)',marginBottom:24}}>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.38)',marginBottom:2}}>Duration</div>
          <div style={{fontSize:16,fontWeight:700,color:accent}}>{fmt(elapsed)}</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.38)',marginBottom:2}}>Volume</div>
          <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>{totalVol>0?`${Math.round(totalVol)} lbs`:'0 lbs'}</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.38)',marginBottom:2}}>Sets</div>
          <div style={{fontSize:16,fontWeight:700,color:'#fff'}}>{totalSets}</div>
        </div>
        <svg width="44" height="40" viewBox="0 0 44 40" fill="none" opacity="0.22">
          <ellipse cx="14" cy="7" rx="4" ry="4" stroke="white" strokeWidth="1.5"/>
          <path d="M14 11v10M10 21l-2 8M18 21l2 8M10 16h8" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
          <ellipse cx="30" cy="7" rx="4" ry="4" stroke="white" strokeWidth="1.5"/>
          <path d="M30 11v10M26 21l-2 8M34 21l2 8M26 16h8" stroke="white" strokeWidth="1.5" strokeLinecap="round"/>
        </svg>
      </div>

      {/* empty state or exercises */}
      {exercises.length===0?(
        <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'48px 20px 32px',gap:12,textAlign:'center'}}>
          <svg width="52" height="34" viewBox="0 0 52 34" fill="none">
            <rect x="0" y="12" width="8" height="10" rx="3" fill="rgba(255,255,255,0.3)"/>
            <rect x="8" y="8" width="6" height="18" rx="2.5" fill="rgba(255,255,255,0.3)"/>
            <line x1="14" y1="17" x2="38" y2="17" stroke="rgba(255,255,255,0.3)" strokeWidth="4" strokeLinecap="round"/>
            <rect x="38" y="8" width="6" height="18" rx="2.5" fill="rgba(255,255,255,0.3)"/>
            <rect x="44" y="12" width="8" height="10" rx="3" fill="rgba(255,255,255,0.3)"/>
          </svg>
          <div style={{fontSize:20,fontWeight:700,color:'#fff'}}>Get started</div>
          <div style={{fontSize:14,color:'rgba(255,255,255,0.45)'}}>Add an exercise to start your workout</div>
        </div>
      ):(
        <div style={{marginBottom:8}}>
          {exercises.map(ex=>(
            <div key={ex.id} style={{marginBottom:24}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                <ExThumb cat={ex.cat} size={36}/>
                <span style={{fontSize:15,fontWeight:700,color:accent}}>{ex.name}</span>
              </div>
              <div style={{display:'flex',padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,0.06)',marginBottom:4}}>
                {['Set','lbs','Reps',''].map(h=><div key={h} style={{flex:h==='Set'?.4:1,fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.3)',textTransform:'uppercase',letterSpacing:'.06em'}}>{h}</div>)}
              </div>
              {ex.sets.map((s,si)=>(
                <div key={s.id} style={{display:'flex',alignItems:'center',padding:'8px 0',borderBottom:'1px solid rgba(255,255,255,0.04)'}}>
                  <div style={{flex:.4,fontSize:14,color:s.done?accent:'rgba(255,255,255,0.45)',fontWeight:600}}>{si+1}</div>
                  <div style={{flex:1}}><input value={s.weight} onChange={e=>updateSet(ex.id,s.id,'weight',e.target.value)} placeholder="–" style={{width:56,background:s.done?`${accent}18`:'rgba(255,255,255,0.07)',border:`1px solid ${s.done?accent+'55':'rgba(255,255,255,0.08)'}`,borderRadius:8,padding:'6px 8px',color:'#fff',fontSize:14,outline:'none'}}/></div>
                  <div style={{flex:1}}><input value={s.reps} onChange={e=>updateSet(ex.id,s.id,'reps',e.target.value)} placeholder="–" style={{width:56,background:s.done?`${accent}18`:'rgba(255,255,255,0.07)',border:`1px solid ${s.done?accent+'55':'rgba(255,255,255,0.08)'}`,borderRadius:8,padding:'6px 8px',color:'#fff',fontSize:14,outline:'none'}}/></div>
                  <div style={{flex:1,display:'flex',justifyContent:'flex-end'}}>
                    <button onClick={()=>toggleDone(ex.id,s.id)} style={{width:30,height:30,borderRadius:15,border:`2px solid ${s.done?accent:'rgba(255,255,255,0.15)'}`,background:s.done?accent:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .15s'}}>
                      {s.done&&<svg width="12" height="10" viewBox="0 0 12 10" fill="none"><path d="M1 5l3.5 3.5L11 1" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                    </button>
                  </div>
                </div>
              ))}
              <button onClick={()=>addSet(ex.id)} style={{background:'none',border:'none',color:accent,fontSize:13,fontWeight:600,padding:'10px 0 0',display:'flex',alignItems:'center',gap:5}}>+ Add Set</button>
            </div>
          ))}
        </div>
      )}

      {/* bottom buttons */}
      <div style={{paddingTop:16,display:'flex',flexDirection:'column',gap:10}}>
        <button onClick={()=>setShowExList(true)} style={{width:'100%',background:accent,border:'none',borderRadius:14,padding:'15px',color:'#fff',fontSize:16,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',gap:8}}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 1v14M1 8h14" stroke="#fff" strokeWidth="2.2" strokeLinecap="round"/></svg>
          Add Exercise
        </button>
        <div style={{display:'flex',gap:10}}>
          <button style={{flex:1,background:'#1e1e1e',border:'1px solid rgba(255,255,255,0.1)',borderRadius:14,padding:'13px',color:'#fff',fontSize:14,fontWeight:600}}>Settings</button>
          <button onClick={onBack} style={{flex:1,background:'#1e1e1e',border:'1px solid rgba(255,255,255,0.1)',borderRadius:14,padding:'13px',color:'#ef4444',fontSize:14,fontWeight:600}}>Discard Workout</button>
        </div>
      </div>
    </div>
  );

function SettingsScreen({accent}){
  const [unit,setUnit]=React.useState('kg');
  const [notifs,setNotifs]=React.useState(true);
  const [compact,setCompact]=React.useState(false);
  const [sound,setSound]=React.useState(false);
  const Row=({label,sub,children,last})=>(
    <div className="sett-row" style={last?{borderBottom:'none'}:{}}>
      <div><div style={{fontSize:15,color:'#fff',fontWeight:500}}>{label}</div>{sub&&<div style={{fontSize:12,color:'rgba(255,255,255,0.32)',marginTop:2}}>{sub}</div>}</div>
      {children}
    </div>
  );
  const Sec=({title,children})=>(
    <div style={{marginBottom:22}}>
      <SectionLabel style={{marginBottom:8}}>{title}</SectionLabel>
      <div className="card card-lg">{children}</div>
    </div>
  );
  return(
    <div className="fade-in">
      <div className="card card-lg" style={{padding:'18px',marginBottom:22,display:'flex',alignItems:'center',gap:14}}>
        <Avatar size={54} fontSize={20}/>
        <div style={{flex:1}}>
          <div style={{fontSize:17,fontWeight:700,color:'#fff'}}>rposh00</div>
          <div style={{fontSize:12,color:'rgba(255,255,255,0.4)',marginTop:2}}>Member since Jan 2024</div>
        </div>
        <button style={{background:accent,border:'none',color:'#fff',fontSize:13,fontWeight:600,padding:'8px 16px',borderRadius:10}}>Edit</button>
      </div>
      <Sec title="Preferences">
        <Row label="Weight Unit">
          <div className="unit-toggle">
            {['kg','lbs'].map(u=><button key={u} className={`unit-btn${unit===u?' active':''}`} onClick={()=>setUnit(u)} style={unit===u?{background:accent}:{}}>{u}</button>)}
          </div>
        </Row>
        <Row label="Workout Reminders" sub="Daily at 7:00 AM"><Toggle on={notifs} onChange={setNotifs} accent={accent}/></Row>
        <Row label="Compact View"><Toggle on={compact} onChange={setCompact} accent={accent}/></Row>
        <Row label="Rest Timer Sound" last><Toggle on={sound} onChange={setSound} accent={accent}/></Row>
      </Sec>
      <Sec title="Data">
        <Row label="Export Workouts" sub="CSV or JSON"><Chevron/></Row>
        <Row label="Import Data" sub="From file or other apps" last><Chevron/></Row>
      </Sec>
      <Sec title="Instance">
        <Row label="Server" sub="Docker · localhost:8080">
          <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:7,height:7,borderRadius:4,background:'#22c55e'}}/><span style={{fontSize:12,color:'#22c55e',fontWeight:600}}>Online</span></div>
        </Row>
        <Row label="Version" last><span style={{color:'rgba(255,255,255,0.28)',fontSize:14}}>1.0.0</span></Row>
      </Sec>
      <button style={{width:'100%',padding:'14px',borderRadius:14,border:'none',background:'rgba(239,68,68,0.1)',color:'#ef4444',fontSize:15,fontWeight:600,marginBottom:8}}>Sign Out</button>
    </div>
  );
}

// ─── Nav config ────────────────────────────────────────────────
const TABS=[
  {id:'profile', label:'Profile',  BIcon:TabIconProfile},
  {id:'workout', label:'Workout',  BIcon:TabIconWorkout},
  {id:'settings',label:'Settings', BIcon:TabIconSettings},
];

// ─── App ───────────────────────────────────────────────────────
function App(){
  const [tweaks,setTweaks]=React.useState(TWEAK_DEFAULTS);
  const [panel,setPanel]=React.useState(false);
  const [tab,setTab]=React.useState('profile');
  const accent=tweaks.accent;

  React.useEffect(()=>{
    const h=e=>{
      if(e.data?.type==='__activate_edit_mode')   setPanel(true);
      if(e.data?.type==='__deactivate_edit_mode') setPanel(false);
    };
    window.addEventListener('message',h);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    return()=>window.removeEventListener('message',h);
  },[]);

  const setAccent=(color,label)=>{
    const next={...tweaks,accent:color,accentLabel:label};
    setTweaks(next);
    window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accent:color,accentLabel:label}},'*');
  };

  return(
    <div className="app">
      {/* Screen */}
      <div className="screen">
        {tab==='profile'  && <ProfileTopBar accent={accent}/>}
        {tab==='workout'  && <SimpleTopBar title="Workout"/>}
        {tab==='settings' && <SimpleTopBar title="Settings"/>}
        <div className="content-scroll">
          <div className="content-inner">
            {tab==='profile'  && <ProfileScreen accent={accent}/>}
            {tab==='workout'  && <WorkoutScreen accent={accent}/>}
            {tab==='settings' && <SettingsScreen accent={accent}/>}
          </div>
        </div>
      </div>

      {/* Bottom nav */}
      <nav className="bottom-nav">
        {TABS.map(({id,label,BIcon})=>{
          const on=tab===id;
          return(
            <button key={id} className={`tab-btn${on?' active':''}`} onClick={()=>setTab(id)} style={{color:on?accent:'rgba(255,255,255,0.32)'}}>
              <BIcon on={on} accent={accent}/>
              {label}
            </button>
          );
        })}
      </nav>

      {/* Tweaks */}
      {panel&&(
        <div style={{position:'fixed',bottom:90,right:16,background:'#1c1c1c',borderRadius:18,padding:'18px 20px',border:'1px solid rgba(255,255,255,0.1)',boxShadow:'0 12px 48px rgba(0,0,0,.6)',zIndex:9999,minWidth:200,color:'#fff',fontFamily:'-apple-system,system-ui'}}>
          <div style={{fontSize:11,fontWeight:700,color:'rgba(255,255,255,0.4)',letterSpacing:'.09em',textTransform:'uppercase',marginBottom:14}}>Tweaks</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.5)',marginBottom:10,fontWeight:500}}>Accent</div>
          <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
            {[{color:'#3b82f6',label:'Blue'},{color:'#22c55e',label:'Green'},{color:'#f97316',label:'Orange'},{color:'#a855f7',label:'Purple'},{color:'#ec4899',label:'Pink'}].map(({color,label})=>(
              <button key={color} onClick={()=>setAccent(color,label)} title={label} style={{width:32,height:32,borderRadius:16,background:color,border:tweaks.accent===color?'2.5px solid #fff':'2.5px solid transparent',cursor:'pointer'}}/>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
